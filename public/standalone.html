            <input id="seed-display" type="text" readonly value="--------" />
            <button id="btn-seed-regen" class="btn small" title="New seed">🎲</button>
            <button id="btn-seed-copy" class="btn small" title="Copy seed">📋</button>
          </div>
          <div class="control-row seed-row">
            <input id="seed-paste" type="text" placeholder="Paste seed…" maxlength="8" />
            <button id="btn-seed-apply" class="btn small">Apply</button>
          </div>
          <div class="control-row" style="margin-top: 8px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 8px;">
            <button id="btn-save-page" class="btn" style="width: 100%;">💾 Save Snapshot</button>
          </div>
          <div class="control-row">
            <button id="btn-export-interactive" class="btn" style="width: 100%;">🎬 Export Interactive Map</button>
          </div>
          <div class="control-row" style="margin-top: 8px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 8px;">
            <textarea id="system-paste" placeholder="Paste system JSON from MWG…" rows="3" style="width: 100%; font-family: monospace; font-size: 10px; resize: vertical;"></textarea>
          </div>
          <div class="control-row">
            <button id="btn-load-system" class="btn small" style="flex: 1;">Load System</button>
            <button id="btn-download-system" class="btn small" style="flex: 1; margin-left: 4px;">Download JSON</button>
          </div>
        </div>

        <!-- System Editor Tab -->
        <div id="tab-editor" class="tab-panel">
          <div id="editor-empty" class="editor-empty">Load a system to edit its data.</div>
          <div id="editor-form" class="editor-form" style="display:none;">
            <div class="editor-section">
              <label>System Name</label>
              <input id="edit-name" type="text" placeholder="Unnamed System" />
            </div>
            <div class="editor-section">
              <label>Primary Star</label>
              <div class="editor-row">
                <select id="edit-star-class">
                  <option value="O">O</option><option value="B">B</option><option value="A">A</option>
                  <option value="F">F</option><option value="G">G</option><option value="K">K</option>
                  <option value="M">M</option>
                </select>
                <select id="edit-star-grade">
                  <option value="0">0</option><option value="1">1</option><option value="2">2</option>
                  <option value="3">3</option><option value="4">4</option><option value="5">5</option>
                  <option value="6">6</option><option value="7">7</option><option value="8">8</option>
                  <option value="9">9</option>
                </select>
              </div>
            </div>
            <div class="editor-section">
              <label>Main World</label>
              <select id="edit-world-type">
                <option value="Terrestrial">Terrestrial</option>
                <option value="Dwarf">Dwarf</option>
                <option value="Ice World">Ice World</option>
              </select>
            </div>
            <div class="editor-section">
              <label>GM Notes</label>
              <textarea id="edit-gm-notes" rows="4" placeholder="Add your notes here…"></textarea>
            </div>
            <div class="control-row" style="margin-top: 8px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 8px;">
              <button id="btn-export-csv" class="btn small" style="flex: 1;">Export CSV</button>
              <button id="btn-export-docx" class="btn small" style="flex: 1; margin-left: 4px;">Export DOCX</button>
            </div>
          </div>
        </div>

        <!-- Travel Planner Tab -->
        <div id="tab-travel" class="tab-panel">
          <div id="travel-empty" class="travel-empty">Select an origin and destination on the map to plan a journey.</div>
          <div id="travel-form" class="travel-form" style="display:none;">
            <div class="travel-section">
              <label>Origin</label>
              <div id="travel-origin" class="travel-body-tag">—</div>
            </div>
            <div class="travel-section">
              <label>Destination</label>
              <div id="travel-destination" class="travel-body-tag">—</div>
            </div>
            <div class="travel-section">
              <label for="travel-delta-v">Spacecraft Delta-V (km/s)</label>
              <input id="travel-delta-v" type="number" step="0.1" min="0" value="20" />
            </div>
            <div class="travel-section">
              <label>
                <input id="travel-use-sim-date" type="checkbox" checked />
                Use current simulation date
              </label>
              <input id="travel-departure-date" type="date" style="display:none;" />
            </div>
            <div class="control-row">
              <button id="btn-calculate-transfer" class="btn" style="width: 100%;">🚀 Calculate Transfer</button>
            </div>
            <div class="control-row">
              <button id="btn-clear-travel" class="btn small" style="width: 100%;">Clear Selection</button>
            </div>
            <div id="travel-results" class="travel-results" style="display:none;">
              <div class="travel-result-row">
                <span class="travel-result-label">Escape Origin:</span>
                <span id="res-escape-origin" class="travel-result-value">—</span>
              </div>
              <div class="travel-result-row">
                <span class="travel-result-label">Capture Dest:</span>
                <span id="res-capture-dest" class="travel-result-value">—</span>
              </div>
              <div class="travel-result-row">
                <span class="travel-result-label">Excess ΔV:</span>
                <span id="res-excess-dv" class="travel-result-value">—</span>
              </div>
              <div class="travel-result-row divider"></div>
              <div class="travel-result-row">
                <span class="travel-result-label">Optimistic:</span>
                <span id="res-optimistic" class="travel-result-value">—</span>
              </div>
              <div class="travel-result-row">
                <span class="travel-result-label">Likely:</span>
                <span id="res-likely" class="travel-result-value">—</span>
              </div>
              <div class="travel-result-row">
                <span class="travel-result-label">Pessimistic:</span>
                <span id="res-pessimistic" class="travel-result-value">—</span>
              </div>
              <div class="travel-result-row divider"></div>
              <div class="travel-result-row">
                <span class="travel-result-label">Next Window:</span>
                <span id="res-next-window" class="travel-result-value">—</span>
              </div>
            </div>
          </div>
        </div>

        <div class="version-footer">
          <span id="version-display" title="Version">—</span>
        </div>
      </div>
      <div id="version-watermark" class="version-watermark" title="Version">—</div>
      <div id="loading" class="loading-overlay" style="display:none">
        <div class="spinner"></div>
        <p>Loading system…</p>
      </div>
    </div>
  </body>
</html>
