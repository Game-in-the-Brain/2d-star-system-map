<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#0b1021"/>
      <stop offset="100%" stop-color="#03050a"/>
    </radialGradient>
    <radialGradient id="star" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff7d6"/>
      <stop offset="40%" stop-color="#ffd166"/>
      <stop offset="100%" stop-color="#e89f2a"/>
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" fill="url(#bg)" rx="64" ry="64"/>
  <circle cx="256" cy="256" r="160" fill="none" stroke="#3a4a6b" stroke-width="2" opacity="0.6"/>
  <circle cx="256" cy="256" r="110" fill="none" stroke="#3a4a6b" stroke-width="2" opacity="0.6"/>
  <circle cx="256" cy="256" r="60" fill="none" stroke="#3a4a6b" stroke-width="2" opacity="0.6"/>
  <circle cx="256" cy="96" r="14" fill="#8ecae6" filter="url(#glow)"/>
  <circle cx="366" cy="256" r="10" fill="#a8dadc" filter="url(#glow)"/>
  <circle cx="196" cy="326" r="8" fill="#f4a261" filter="url(#glow)"/>
  <circle cx="256" cy="256" r="36" fill="url(#star)" filter="url(#glow)"/>
</svg>
